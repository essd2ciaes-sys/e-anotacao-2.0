<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redefinir Senha</title>

<style>

body{

  font-family:Arial;

  background:#111827;

  display:flex;

  justify-content:center;

  align-items:center;

  height:100vh;

  margin:0;
}

.box{

  background:#1F2937;

  padding:40px;

  border-radius:20px;

  width:100%;
  max-width:420px;

  color:white;
}

input{

  width:100%;

  padding:14px;

  margin-top:15px;

  border:none;

  border-radius:12px;

  background:#374151;

  color:white;
}

button{

  width:100%;

  margin-top:20px;

  padding:14px;

  border:none;

  border-radius:12px;

  background:#2563EB;

  color:white;

  font-weight:bold;

  cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Nova Senha</h2>

<input
id="senha"
type="password"
placeholder="Nova senha"
>

<input
id="confirmar"
type="password"
placeholder="Confirmar senha"
>

<button onclick="redefinir()">
ALTERAR SENHA
</button>

</div>

<script src="config.js"></script>

<script>

const token =
new URLSearchParams(
  window.location.search
).get("token");

async function redefinir(){

  const senha =
  document.getElementById("senha")
  .value;

  const confirmar =
  document.getElementById("confirmar")
  .value;

  if(senha.length < 6){

    alert(
      "Senha mínima de 6 caracteres."
    );

    return;
  }

  if(senha != confirmar){

    alert(
      "As senhas não coincidem."
    );

    return;
  }

  const formData =
  new URLSearchParams();

  formData.append(
    "action",
    "redefinir_senha"
  );

  formData.append(
    "token",
    token
  );

  formData.append(
    "senha",
    senha
  );

  try{

    const resposta =
    await fetch(

      CONFIG.API_USUARIOS,

      {

        method:"POST",

        body:formData
      }
    );

    const dados =
    await resposta.json();

    if(dados.status == "ok"){

      alert(
        "Senha redefinida com sucesso."
      );

      window.location =
      "login.html";

    }else{

      alert(
        dados.erro ||
        "Erro."
      );
    }

  }catch(e){

    alert(
      "Erro de conexão."
    );
  }
}

</script>

</body>
</html>
