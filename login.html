<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - E-Anotação 2.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
        135deg,
        #111827,
        #1F2937
    );

    height:100vh;

    display:flex;

    align-items:center;

    justify-content:center;
}

.login-box{

    width:100%;
    max-width:420px;

    background:#1F2937;

    padding:50px;

    border-radius:28px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35);

    color:white;

    text-align:center;

    position:relative;
}

.logo{

    height:90px;

    margin-bottom:20px;
}

h1{

    font-size:32px;

    margin-bottom:10px;
}

.sub{

    color:#D1D5DB;

    margin-bottom:30px;
}

label{

    display:block;

    text-align:left;

    margin-bottom:8px;

    margin-top:18px;

    font-size:14px;

    font-weight:600;
}

input{

    width:100%;

    padding:16px;

    border:none;

    border-radius:14px;

    background:#374151;

    color:white;

    font-size:16px;
}

input:focus{

    outline:none;

    box-shadow:
    0 0 0 4px rgba(37,99,235,.25);
}

button{

    width:100%;

    margin-top:24px;

    padding:16px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(
        135deg,
        #2563EB,
        #1D4ED8
    );

    color:white;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

button:hover{

    transform:translateY(-2px);
}

.link{

    margin-top:22px;

    font-size:14px;
}

.link a{

    color:#60A5FA;

    text-decoration:none;
}

.aviso{

    margin-top:24px;

    color:#9CA3AF;

    font-size:13px;
}

</style>

</head>

<body>

<div class="login-box">

<img src="logo_pm.png" class="logo">

<h1>E-Anotação 2.0</h1>

<div class="sub">
Sistema de Controle de Conduta Escolar
</div>

<label>
CPF ou E-mail Institucional
</label>

<input
type="text"
id="login"
placeholder="Digite CPF ou e-mail"
>

<label>
Senha
</label>

<input
type="password"
id="senha"
placeholder="Digite sua senha"
>

<button onclick="entrar()">
ENTRAR
</button>

<div class="link">

<a href="cadastro.html">
Cadastrar novo usuário
</a>

</div>

<div class="aviso">
Acesso restrito à ESSD
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzcKtTNjF4YEirv6fPD_3nLX-PSK94YvkFxVsVsuUmvZ7KlY74TlT9kC4ALtYTrCKUG/exec";

/* =====================================================
   LOGIN
===================================================== */

async function entrar(){

    const login =
    document.getElementById("login")
    .value
    .trim();

    const senha =
    document.getElementById("senha")
    .value
    .trim();

    if(!login || !senha){

        alert(
            "Preencha login e senha."
        );

        return;
    }

    try{

        const resposta =
        await fetch(API_URL,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                action:"login",

                login:login,

                senha:senha
            })
        });

        const dados =
        await resposta.json();

        console.log(dados);

        if(dados.status == "ok"){

            // =========================
            // SESSÃO
            // =========================

            sessionStorage.setItem(
                "logado",
                "sim"
            );

            // =========================
            // DADOS USUÁRIO
            // =========================

            sessionStorage.setItem(
                "usuario_nome",
                dados.nome
            );

            sessionStorage.setItem(
                "usuario_re",
                dados.re
            );

            sessionStorage.setItem(
                "usuario_cargo",
                dados.cargo
            );

            sessionStorage.setItem(
                "usuario_email",
                dados.email
            );

            // =========================
            // REDIRECIONAR
            // =========================

            window.location =
            "index.html";

        }else{

            alert(
                dados.erro ||
                "Login inválido."
            );
        }

    }catch(erro){

        console.log(erro);

        alert(
            "Erro de conexão."
        );
    }
}

</script>

</body>
</html>
