<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - E-Anotação 2.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Inter',sans-serif;

    background:
    linear-gradient(
        135deg,
        #111827,
        #1F2937
    );

    height:100vh;

    display:flex;

    align-items:center;

    justify-content:center;
}

.login-box{

    width:100%;
    max-width:420px;

    background:#1F2937;

    padding:50px;

    border-radius:28px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.35);

    color:white;

    text-align:center;
}

.logo{

    height:90px;

    margin-bottom:20px;
}

h1{

    font-size:32px;

    margin-bottom:10px;
}

.sub{

    color:#D1D5DB;

    margin-bottom:30px;
}

label{

    display:block;

    text-align:left;

    margin-bottom:8px;

    margin-top:18px;

    font-size:14px;

    font-weight:600;
}

input{

    width:100%;

    padding:16px;

    border:none;

    border-radius:14px;

    background:#374151;

    color:white;

    font-size:16px;
}

input:focus{

    outline:none;

    box-shadow:
    0 0 0 4px rgba(37,99,235,.25);
}

button{

    width:100%;

    margin-top:24px;

    padding:16px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(
        135deg,
        #2563EB,
        #1D4ED8
    );

    color:white;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

button:hover{

    transform:translateY(-2px);
}

.link{

    margin-top:22px;
}

.link a{

    color:#60A5FA;

    text-decoration:none;

    font-size:14px;
}

.aviso{

    margin-top:24px;

    color:#9CA3AF;

    font-size:13px;
}

</style>

<script src="config.js"></script>

</head>

<body>

<div class="login-box">

<img src="logo_pm.png" class="logo">

<h1>E-Anotação 2.0</h1>

<div class="sub">
Sistema de Controle de Conduta Escolar
</div>

<label>
CPF ou E-mail Institucional
</label>

<input
type="text"
id="login"
placeholder="Digite CPF ou e-mail"
oninput="formatarLogin(this)"
>

<label>
Senha
</label>

<input
type="password"
id="senha"
placeholder="Digite sua senha"
>

<button onclick="entrar()">
ENTRAR
</button>

<div class="link">

<a href="cadastro.html">
Cadastrar novo usuário
</a>

<br><br>

<a href="esqueci.html">
Esqueci minha senha
</a>


</div>

<div class="aviso">
Acesso restrito à ESSD
</div>

</div>
<script src="config.js"></script>

<script>

const API_URL =
CONFIG.API_USUARIOS;
function formatarLogin(campo){

    let valor = campo.value;

    // =====================================
    // SE TIVER LETRAS OU @ = EMAIL
    // =====================================

    if(/[a-zA-Z@]/.test(valor)){

        campo.value =
        valor.toLowerCase();

        return;
    }

    // =====================================
    // CPF
    // =====================================

    valor =
    valor.replace(/\D/g,'');

    valor = valor.replace(
        /(\d{3})(\d)/,
        '$1.$2'
    );

    valor = valor.replace(
        /(\d{3})(\d)/,
        '$1.$2'
    );

    valor = valor.replace(
        /(\d{3})(\d{1,2})$/,
        '$1-$2'
    );

    campo.value = valor;
}
/* =================================================
   LOGIN
==================================================== */

/* =================================================
   LOGIN
==================================================== */

async function entrar(){

    const login =
    document
    .getElementById("login")
    .value
    .trim();

    const senha =
    document
    .getElementById("senha")
    .value
    .trim();

    if(!login || !senha){

        alert(
            "Preencha login e senha."
        );

        return;
    }

    try{

        const formData =
        new URLSearchParams();

        formData.append(
            "action",
            "login"
        );

        formData.append(
            "login",
            login
        );

        formData.append(
            "senha",
            senha
        );

        const resposta =
        await fetch(API_URL,{

            method:"POST",

            body:formData

        });

        const texto =
        await resposta.text();

        console.log(texto);

        const dados =
        JSON.parse(texto);

        // =====================================
        // LOGIN OK
        // =====================================

        if(dados.status == "ok"){

            sessionStorage.setItem(
                "logado",
                "sim"
            );

            sessionStorage.setItem(

                "usuario",

                JSON.stringify({

                    nome:dados.nome,
                    cpf:dados.cpf,
                    email:dados.email,
                    re:dados.re,
                    cargo:dados.cargo

                })
            );

            sessionStorage.setItem(
                "usuario_nome",
                dados.nome
            );

            sessionStorage.setItem(
                "usuario_re",
                dados.re
            );

            sessionStorage.setItem(
                "usuario_cargo",
                dados.cargo
            );

            sessionStorage.setItem(
                "usuario_email",
                dados.email
            );

            window.location =
            "index.html";

            return;
        }

        // =====================================
        // RESET OBRIGATÓRIO
        // =====================================

        if(
            dados.status ==
            "reset_obrigatorio"
        ){

            alert(
                "Por segurança, redefina sua senha utilizando a opção 'Esqueci minha senha'."
            );

            return;
        }

        // =====================================
        // ERRO NORMAL
        // =====================================

        alert(
            dados.erro ||
            "Usuário ou senha inválidos."
        );

    }catch(erro){

        console.log(erro);

        alert(
            "Erro de conexão."
        );
    }
}

</script>

<script>

document.addEventListener(
"contextmenu",
e => e.preventDefault()
);

document.onkeydown = function(e){

    if(e.keyCode == 123){

        return false;
    }

    if(
        e.ctrlKey &&
        e.shiftKey &&
        e.keyCode == 'I'.charCodeAt(0)
    ){

        return false;
    }
}

</script>

</body>
</html>
